<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Noto Sans','Segoe UI',Tahoma,sans-serif;overscroll-behavior:none}
:root{
  --lime:#a8d400;--lime-d:#8ab000;--lime-dd:#5a7800;
  --lime-bg:rgba(168,212,0,.09);--lime-bd:rgba(168,212,0,.28);
  --bg:#0d0d0b;--card:#111300;--card-bd:#1e1f00;
  --panel:#161700;--brown:#1c1400;--brown-bd:#302600;
  --txt:#e8e8c0;--txt-dim:#6a6840;--txt-mid:#9a9860;
  --red:#e05050;--red-bg:#3a1010;
  --green:#50e080;--green-bg:#0e3018;
  --blue:#60b8e0;--blue-bg:#10203a;
  --shadow:0 4px 24px rgba(0,0,0,.6);
  --inp-bg:#1c1400;
}
body.light{
  --lime:#6a8800;--lime-d:#527000;--lime-dd:#3a5000;
  --lime-bg:rgba(168,212,0,.12);--lime-bd:rgba(168,212,0,.5);
  --bg:#f3f3e8;--card:#ffffff;--card-bd:#deded0;
  --panel:#fafae8;--brown:#f0f0df;--brown-bd:#d0d0a0;
  --txt:#1a1a00;--txt-dim:#7a7850;--txt-mid:#5a5830;
  --red:#b02020;--red-bg:#ffe0e0;
  --green:#287848;--green-bg:#d0ffe0;
  --blue:#2060a0;--blue-bg:#d0e8ff;
  --shadow:0 4px 24px rgba(0,0,0,.1);
  --inp-bg:#f5f5e0;
}
body{background:var(--bg);color:var(--txt);transition:background .3s,color .3s;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--card)}
::-webkit-scrollbar-thumb{background:var(--brown-bd);border-radius:3px}

/* ── Layout ── */
#header{position:sticky;top:0;z-index:50;background:var(--panel);border-bottom:1px solid var(--brown-bd);box-shadow:var(--shadow)}
#header-top{max-width:1140px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:60px;gap:12px}
#tabs{max-width:1140px;margin:0 auto;display:flex;overflow-x:auto;padding:0 8px;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
#main{max-width:1140px;margin:0 auto;padding:24px 16px 80px}

/* ── Typography ── */
h1,h2,.logo-text{font-family:'Permanent Marker',cursive}
.logo-text{font-size:26px;color:var(--lime);letter-spacing:.04em;text-shadow:0 0 18px rgba(168,212,0,.5),1px 2px 0 #000;line-height:1}
.page-title{font-size:22px;font-weight:700;color:var(--lime);margin-bottom:18px}

/* ── Tabs ── */
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'Noto Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:.05em;padding:10px 13px;color:var(--txt-dim);transition:color .2s;white-space:nowrap}
.tab-btn:hover{color:var(--lime)}
.tab-btn.active{color:var(--lime);border-bottom-color:var(--lime)}

/* ── Buttons ── */
.btn{background:var(--lime);color:#0d0d0b;border:none;padding:9px 18px;border-radius:5px;cursor:pointer;font-family:'Noto Sans',sans-serif;font-weight:700;font-size:12px;transition:background .2s,transform .1s;letter-spacing:.03em;white-space:nowrap}
.btn:hover{background:var(--lime-d);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-o{background:transparent;color:var(--lime);border:1.5px solid var(--lime);padding:8px 16px;border-radius:5px;cursor:pointer;font-family:'Noto Sans',sans-serif;font-size:12px;font-weight:600;transition:all .2s;white-space:nowrap}
.btn-o:hover{background:var(--lime-bg)}
.btn-ghost{background:transparent;color:var(--txt-dim);border:1px solid var(--brown-bd);padding:7px 14px;border-radius:5px;cursor:pointer;font-family:'Noto Sans',sans-serif;font-size:12px;transition:all .2s;white-space:nowrap}
.btn-ghost:hover{border-color:var(--lime);color:var(--lime)}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red);padding:7px 14px;border-radius:5px;cursor:pointer;font-family:'Noto Sans',sans-serif;font-size:12px}

/* ── Form ── */
.lbl{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--txt-dim);margin-bottom:5px}
.inp{background:var(--inp-bg);border:1.5px solid var(--brown-bd);border-radius:5px;color:var(--txt);padding:9px 13px;font-family:'Noto Sans',sans-serif;font-size:13px;width:100%;outline:none;transition:border-color .2s;-webkit-appearance:none}
.inp:focus{border-color:var(--lime)}
.inp option{background:var(--inp-bg);color:var(--txt)}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--card-bd);border-radius:8px}
.card-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--card-bd);cursor:pointer;transition:background .15s}
.card-row:last-child{border-bottom:none}
.card-row:hover{background:var(--brown)}

/* ── Overlay / Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(8px);padding:16px}
.modal{background:var(--panel);border:1px solid var(--brown-bd);border-radius:12px;padding:28px 24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-title{font-size:19px;font-weight:700;color:var(--lime);margin-bottom:22px}
.form-col{display:flex;flex-direction:column;gap:13px}

/* ── Badge ── */
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-lime{background:var(--lime-bg);color:var(--lime)}

/* ── Dot indicators ── */
.dots{display:flex;gap:4px;align-items:center}
.dot{width:9px;height:9px;border-radius:50%}

/* ── Toggle (dark/light) ── */
.theme-toggle{width:44px;height:24px;border-radius:12px;border:1.5px solid var(--brown-bd);background:var(--brown);cursor:pointer;position:relative;flex-shrink:0;transition:background .3s}
.theme-toggle-knob{width:18px;height:18px;border-radius:50%;position:absolute;top:2px;transition:left .25s,background .3s}

/* ── Checkbox toggle ── */
.chk-box{width:20px;height:20px;border-radius:4px;border:2px solid var(--brown-bd);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;flex-shrink:0;user-select:none}
.chk-box.on{background:var(--lime);border-color:var(--lime);color:#0d0d0b;font-weight:700}

/* ── Day card (Bugün/Yarın) ── */
.day-card{background:var(--card);border:1px solid var(--card-bd);border-radius:8px;padding:16px 18px;display:flex;align-items:center;gap:14px;margin-bottom:10px;transition:border-color .2s,background .2s}
.day-card.done{background:var(--green-bg);border-color:#206040}
.tik{width:46px;height:46px;border-radius:10px;border:2px solid var(--brown-bd);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;font-weight:700;color:var(--green);cursor:pointer;user-select:none;transition:all .25s}
.tik.done{background:var(--green-bg);border-color:var(--green);box-shadow:0 0 12px rgba(80,224,128,.25)}
.tik.locked{cursor:default}

/* ── Paket kare ── */
.paket-sq{display:flex;gap:4px}
.p-sq{width:10px;height:10px;border-radius:2px}

/* ── Program grid ── */
.prog-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
@media(max-width:700px){.prog-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:450px){.prog-grid{grid-template-columns:repeat(3,1fr)}}
.prog-col{border-radius:7px;min-height:180px;overflow:hidden}
.prog-slot{border-radius:4px;padding:6px 7px;margin-bottom:5px;cursor:pointer;position:relative}

/* ── Checklist ── */
.cl-sq{border-radius:5px;padding:7px 6px;min-height:48px;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;gap:2px}

/* ── Animations ── */
@keyframes pop{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .2s ease-out}
@keyframes sd{0%{opacity:0;transform:translateY(-8px)}100%{opacity:1;transform:translateY(0)}}
.sd{animation:sd .2s ease-out}
@keyframes neonPulse{0%,100%{opacity:1;box-shadow:0 0 8px currentColor}50%{opacity:.75;box-shadow:0 0 22px currentColor, 0 0 6px currentColor}}

/* ── Grid helpers ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:600px){.grid2{grid-template-columns:1fr}.grid3{grid-template-columns:1fr 1fr}}
@media(max-width:360px){.grid3{grid-template-columns:1fr}}
.flex{display:flex}.gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}.gap14{gap:14px}
.flex-center{align-items:center}.flex-end{justify-content:flex-end}.flex-between{justify-content:space-between}
.flex-wrap{flex-wrap:wrap}.flex1{flex:1}.mw0{min-width:0}
.mt4{margin-top:4px}.mt6{margin-top:6px}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt14{margin-top:14px}.mt18{margin-top:18px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}.mb18{margin-bottom:18px}.mb22{margin-bottom:22px}
.p16{padding:16px}.p20{padding:20px}.p24{padding:24px}
.text-center{text-align:center}.text-right{text-align:right}
.f10{font-size:10px}.f11{font-size:11px}.f12{font-size:12px}.f13{font-size:13px}.f14{font-size:14px}.f16{font-size:16px}.f20{font-size:20px}.f24{font-size:24px}
.fw5{font-weight:500}.fw6{font-weight:600}.fw7{font-weight:700}.fw8{font-weight:800}
.c-lime{color:var(--lime)}.c-dim{color:var(--txt-dim)}.c-mid{color:var(--txt-mid)}.c-red{color:var(--red)}.c-green{color:var(--green)}
.upper{text-transform:uppercase}.ls1{letter-spacing:.1em}
.of-hidden{overflow:hidden}.ellipsis{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sep{height:1px;background:var(--card-bd);margin:0}
.divider{width:1px;height:28px;background:var(--brown-bd)}
.bar{height:5px;flex:1;border-radius:3px}
</style>
</head>

function setSyncStatus(s, msg){
  _syncStatus = s;
  const el = document.getElementById("sync-status");
  if(!el) return;
  const map = {
    idle:    {icon:"☁️",  color:"var(--txt-dim)", text: GAS_URL ? "Sync hazır" : "Sync ayarlanmamış — 💾 butonundan ayarla"},
    syncing: {icon:"🔄", color:"var(--lime)",     text: "Senkronize ediliyor…"},
    ok:      {icon:"✅", color:"var(--green)",     text: msg || "Senkronize"},
    error:   {icon:"⚠️", color:"var(--red)",       text: "Sync hatası: " + msg}
  };
  const d = map[s] || map.idle;
  el.innerHTML = `<span style="color:${d.color};font-size:11px">${d.icon} ${d.text}</span>`;
}

function jsonp(url, cb){
  return new Promise((resolve, reject)=>{
    const id = "_jp" + Date.now();
    const s = document.createElement("script");
    window[id] = (data)=>{ delete window[id]; document.head.removeChild(s); resolve(data); };
    s.onerror = ()=>{ delete window[id]; document.head.removeChild(s); reject(new Error("JSONP failed")); };
    s.src = url + "&callback=" + id;
    document.head.appendChild(s);
  });
}

async function syncToDrive(silent){
  if(!GAS_URL){ if(!silent) setSyncStatus("error","URL ayarlanmamış"); return; }
  setSyncStatus("syncing","");
  try {
    const ts = Date.now();
    const veri = {ogr,slot,drs,odm,gmd};
    const payload = {action:"save", data:veri, ts};
    const res = await fetch(GAS_URL + "?action=save", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });
    const json = await res.json();
    if(json.ok){
      setSyncStatus("ok", new Date().toLocaleTimeString("tr-TR"));
      // Ayrıca tarihe göre yedek de kaydet (birikmeli, üzerine yazmaz)
      const yedekPayload = {action:"save", data:veri, ts, key:"yedek_"+ts};
      fetch(GAS_URL + "?action=saveBackup", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify(yedekPayload)
      }).catch(()=>{}); // Yedek başarısız olsa bile sessizce devam
    } else { setSyncStatus("error", json.msg||"Hata"); }
  } catch(e){ setSyncStatus("error", e.message); }
}

async function syncFromDrive(silent){
  if(!GAS_URL){ if(!silent) alert("Önce Drive sync ayarlarını yapın (💾 → ⚙️ Sync)"); return; }
  setSyncStatus("syncing","");
  try {
    const res = await fetch(GAS_URL + "?action=load&t="+Date.now());
    const json = await res.json();
    if(json.ok && json.data){
      const d = json.data;
      const driveOgrSayisi = (d.ogr||[]).length;

      if(silent){
        const driveTs = d.ts || 0;
        const localTs = load("doras_last_ts", 0);

        if(ogr.length === 0){
          // Local boş → Drive'dan yükle (ilk kurulum)
          ogr=d.ogr||[]; slot=d.slot||[]; drs=d.drs||[]; odm=d.odm||[];
          const allIds=[...ogr.map(x=>x.id),...slot.map(x=>x.id),...drs.map(x=>x.id),...odm.map(x=>x.id)];
          _nid = allIds.length ? Math.max(...allIds)+1 : 100;
          save("doras_last_ts", driveTs);
          // persist() yerine direkt kaydet (sonsuz döngü önlemi)
          save(KEYS.ogr,ogr);save(KEYS.slot,slot);save(KEYS.drs,drs);save(KEYS.odm,odm);
          render();
          setSyncStatus("ok","Drive'dan yüklendi");
          return;
        }

        if(driveTs > localTs + 5000){
          // Drive daha yeni (5sn tolerans) → otomatik güncelle
          // Önce yerel snapshot al
          try {
            const snapKey = "doras_snap_" + Date.now();
            localStorage.setItem(snapKey, JSON.stringify({
              ogr,slot,drs,odm,ts:Date.now(),
              tarih:"[Otosync öncesi] "+new Date().toLocaleString("tr-TR")
            }));
          } catch(e){}
          ogr=d.ogr||[]; slot=d.slot||[]; drs=d.drs||[]; odm=d.odm||[];
          const allIds=[...ogr.map(x=>x.id),...slot.map(x=>x.id),...drs.map(x=>x.id),...odm.map(x=>x.id)];
          _nid = allIds.length ? Math.max(...allIds)+1 : 100;
          save("doras_last_ts", driveTs);
          save(KEYS.ogr,ogr);save(KEYS.slot,slot);save(KEYS.drs,drs);save(KEYS.odm,odm);
          render();
          setSyncStatus("ok","Güncellendi · "+new Date().toLocaleTimeString("tr-TR"));
          return;
        }

        // Local daha yeni veya eşit → dokunma
        setSyncStatus("ok", new Date().toLocaleTimeString("tr-TR"));
        return;
      }

      // Manuel sync: kullanıcıya sor
      if(!confirm(`Drive'dan ${driveOgrSayisi} öğrenci yüklenecek.\n\n⚠ Yerel verileriniz (${ogr.length} öğrenci) Drive'daki veriyle DEĞİŞTİRİLECEK.\n\nEmin misiniz?`)){
        setSyncStatus("idle","");
        return;
      }
      // Drive'dan yüklemeden önce otomatik snapshot - geri dönüş için
      try {
        const snapKey = "doras_snap_" + Date.now();
        localStorage.setItem(snapKey, JSON.stringify({ogr,slot,drs,odm,ts:Date.now(),tarih:"[Drive'dan önce] "+new Date().toLocaleString("tr-TR")}));
      } catch(e){}
      ogr=d.ogr||[]; slot=d.slot||[]; drs=d.drs||[]; odm=d.odm||[];
      const allIds=[...ogr.map(x=>x.id),...slot.map(x=>x.id),...drs.map(x=>x.id),...odm.map(x=>x.id)];
      _nid = allIds.length ? Math.max(...allIds)+1 : 100;
      save("doras_last_ts", d.ts||0);
      persist(); render();
      setSyncStatus("ok","Drive'dan yüklendi");
    } else { setSyncStatus("error", json.msg||"Veri bulunamadı"); }
  } catch(e){ setSyncStatus("error", e.message); }
}

function scheduleSyncToDrive(){
  clearTimeout(_syncTimer);
  if(!GAS_URL) return;
  _syncTimer = setTimeout(()=>syncToDrive(true), 2000); // 2sn debounce

/* ── Computed ── */
const ogrRenk = id => { const i=ogr.findIndex(o=>o.id===id); return RENKLER[i%RENKLER.length]||"#a8d400"; };
const gunSlotlar = gi => slot.filter(s=>s.gun===gi).sort((a,b)=>a.saat>b.saat?1:-1);
/* ══════════════════════════
   PAKET / SLOT SİSTEMİ
   Her slot (gün+saat kombinasyonu) kendi bağımsız 4 kutucuğuna sahip.
   Öğrencinin slot yoksa (slottan bağımsız dersler) tek paket olarak gösterilir.
══════════════════════════ */

// Bir slot için son ödeme tarihinden sonraki dersleri sayar
const paketDurSlot = (oid, slotId, d, o) => {
  // Sadece tip==="paket" olan ödemeler paketi kapatır (erken ödemeler kapatmaz)
  const slotOdm = o.filter(x => x.oid===oid && (slotId ? x.slot_id===slotId : !x.slot_id) && x.tip!=="erken")
                   .sort((a,b) => b.tarih.localeCompare(a.tarih));
  const sonOdmTarih = slotOdm[0]?.tarih || "2000-01-01";
  return d.filter(x => x.oid===oid && (slotId ? x.slot_id===slotId : !x.slot_id) && x.tarih > sonOdmTarih).length;
};

// Geriye dönük uyumluluk: slot olmayan öğrenciler için toplam paket sayısı
const paketDur = (oid, d, o) => {
  const ogSlotlar = slot.filter(s => s.oid === oid);
  if(!ogSlotlar.length){
    // Slot yok: eski sistem
    const son = (o.filter(x=>x.oid===oid&&x.tip!=="erken").sort((a,b)=>b.tarih.localeCompare(a.tarih))[0]?.tarih)||"2000-01-01";
    return d.filter(x=>x.oid===oid && x.tarih>son).length;
  }
  // Slot var: en dolu slotu döndür (borçlu gösterimi için)
  return Math.max(...ogSlotlar.map(s => paketDurSlot(oid, s.id, d, o)));
};

const borcluList = () => ogr.filter(o => {
  // 4 ders tamamlanmış → ödeme bekliyor
  if(paketDur(o.id, drs, odm) >= 4) return true;
  // Hiç ödeme yapılmamış YENİ öğrenci → ödeme bekliyor
  const hicOdemeYok = odm.filter(x=>x.oid===o.id).length === 0;
  const enAzBirDers = drs.filter(x=>x.oid===o.id).length > 0;
  if(hicOdemeYok && enAzBirDers) return true;
  return false;
});

// Ödeme yapılmamış sıfır-ders öğrenciler (henüz derse gelmedi ama ödeme bekleniyor)
const odemeKayitBekleyenler = () => ogr.filter(o =>
  odm.filter(x=>x.oid===o.id).length === 0 &&
  drs.filter(x=>x.oid===o.id).length === 0
);

// Bir slot için mevcut paketteki dersleri getir (son ödeme sonrası)
const slotMevcutDrs = (oid, slotId) => {
  const slotOdm = odm.filter(x => x.oid===oid && (slotId ? x.slot_id===slotId : !x.slot_id) && x.tip!=="erken")
                     .sort((a,b) => b.tarih.localeCompare(a.tarih));
  const sonOdmTarih = slotOdm[0]?.tarih || "2000-01-01";
  return drs.filter(x => x.oid===oid && (slotId ? x.slot_id===slotId : !x.slot_id) && x.tarih > sonOdmTarih)
            .sort((a,b) => a.tarih.localeCompare(b.tarih));
};

function dotsHtml(oid, renk){
  const ogSlotlar = slot.filter(s => s.oid === oid);
  if(!ogSlotlar.length){
    const p = Math.min(paketDur(oid, drs, odm), 4);
    return _dotsRow(p, renk, p>=4);
  }
  // Çoklu slot: her biri için ayrı dots göster
  return ogSlotlar.map(s => {
    const p = Math.min(paketDurSlot(oid, s.id, drs, odm), 4);
    const dolu = p >= 4;
    return `<div class="flex flex-center gap4" style="margin-bottom:2px">
      <span class="f9 c-dim" style="width:30px;text-overflow:ellipsis;overflow:hidden;white-space:nowrap">${GUNLER[s.gun].slice(0,3)}</span>
      ${_dotsRow(p, renk, dolu)}
    </div>`;
  }).join('');
}

function _dotsRow(p, renk, dolu){
  return `<div class="dots">${[1,2,3,4].map(i=>`<div class="dot" style="border:1.5px solid ${i<=p?renk:'var(--brown-bd)'};background:${i<=p?renk:'transparent'}"></div>`).join('')}<span class="f10 c-dim" style="margin-left:3px">${Math.min(p,4)}/4${dolu?'<span class="c-red fw7"> !</span>':''}</span></div>`;
}

function renderBugun(gunStr, gunIdx, kilitli){
  const gunAdi = GUNLER[gunIdx];
  const slots  = gunSlotlar(gunIdx);
  const baslik = `${gunAdi} Dersleri`;
  const sub    = kilitli ? "Yarın beklenen öğrenciler — sadece önizleme" : `${BUGUN.getDate()} ${AYLAR[BU_AY]} ${BU_YIL} — Öğrenci gelince tik kutusuna tıkla`;

  let html = `<div class="flex flex-between flex-center flex-wrap gap8 mb18">
    <div><div class="page-title" style="margin-bottom:4px">${esc(baslik)}</div><div class="f12 c-dim">${sub}</div></div>
    ${kilitli?`<div style="background:var(--brown);border:1px solid var(--brown-bd);border-radius:6px;padding:7px 14px;font-size:12px;color:var(--txt-dim)">🔒 Sadece önizleme</div>`:""}
  </div>`;

  if(!slots.length){
    html+=`<div class="card p24 text-center c-dim f13">Bu gün için ders slotu tanımlanmamış.</div>`;
  } else {
    const simdi = new Date();
    slots.forEach(s=>{
      const o=ogr.find(x=>x.id===s.oid); if(!o)return;
      const bugunDrs=drs.filter(d=>d.oid===o.id && d.tarih===gunStr && (d.slot_id===s.id || (!d.slot_id && !slot.find(sl=>sl.oid===o.id&&sl.id!==s.id))));
      const aldi=bugunDrs.length>0;
      const paket=paketDurSlot(o.id, s.id, drs, odm);
      const borclu=paket>=4;
      const renk=ogrRenk(o.id);
      const tikClass=`tik${aldi?" done":""}${kilitli?" locked":""}`;

      // Gelmedi kaydı var mı?
      const gelmediKayit = gmd.find(g=>g.oid===o.id && g.slotId===s.id && g.tarih===gunStr);

      // Ders saati penceresi: saat geldi mi, 3 saat geçti mi?
      let aktifPencere = false;
      let pencerebitis = false;
      if(!kilitli && s.saat){
        const [sh,sm] = s.saat.split(":").map(Number);
        const dersBaslangic = new Date(simdi); dersBaslangic.setHours(sh,sm,0,0);
        const dersBitis = new Date(dersBaslangic); dersBitis.setHours(sh+3,sm,0,0);
        aktifPencere = simdi >= dersBaslangic && simdi <= dersBitis;
        pencerebitis = simdi > dersBitis;
      }

      const slotDers2 = s.ders||o.ders||"Diğer";
      const dr2 = dersRenk(slotDers2);
      const neonStyle = aktifPencere && !aldi && !gelmediKayit
        ? `box-shadow:0 0 20px ${dr2.glow}, 0 0 8px ${dr2.glow}; border-color:${dr2.border}; background:${dr2.bg}; animation:neonPulse 2s ease-in-out infinite;`
        : gelmediKayit
        ? `border-color:var(--red);background:var(--red-bg);`
        : aldi
        ? `border-left:3px solid ${dr2.border};background:var(--green-bg);`
        : `border-left:3px solid ${dr2.border};background:${dr2.bg};`;

      html+=`<div class="day-card${aldi?" done":""}" data-checklistAc="${o.id}" style="cursor:pointer;${neonStyle}" title="${esc(o.isim)} — kayıtlara git">
        <div class="${tikClass}" ${!kilitli&&!aldi&&!gelmediKayit?`onclick="event.stopPropagation();dersKayitSor(${o.id},${s.id},'${gunStr}','${s.saat||''}')" style="cursor:pointer"`:""} title="${kilitli?"Önizleme":aldi?"İşaretlendi":gelmediKayit?"Gelmedi 😔":"Tıkla — ders aldı"}">${aldi?"✓":gelmediKayit?"✗":""}</div>
        <div class="flex1 mw0">
          <div class="flex flex-center gap8 flex-wrap">
            <span class="f15 fw7" style="color:${aldi?"var(--green)":gelmediKayit?"var(--red)":"var(--txt)"}">${esc(o.isim)}</span>
            ${borclu?`<span class="badge badge-red">ÖDEME GEREKİYOR</span>`:""}
            ${aktifPencere&&!aldi&&!gelmediKayit?`<span class="badge" style="background:${dr2.border}33;color:${dr2.text};border:1px solid ${dr2.border};animation:neonPulse 2s infinite">● Ders Vakti</span>`:""}
            ${gelmediKayit?`<span class="badge badge-red">😔 Gelmedi — ${fmtD(gelmediKayit.tarih)}</span>`:""}
          </div>
          <div class="f12 mt4" style="color:${dr2.text}">${esc(s.ders||o.ders)} · ${s.saat}${(s.ogretmen||o.ogretmen)?' · '+esc(s.ogretmen||o.ogretmen):''}</div>
          <div class="f11 c-dim">Slot: ${GUNLER[s.gun]} ${s.saat} — ${Math.min(paket,4)}/4</div>
        </div>
        <div class="flex" style="flex-direction:column;align-items:flex-end;gap:7px;flex-shrink:0">
          ${!kilitli&&aldi?`<button class="btn-ghost" style="color:var(--red);border-color:var(--red);font-size:11px" data-dersGeri="${o.id}" data-slotId="${s.id}" onclick="event.stopPropagation()">↩ Geri Al</button>`:""}
          ${!kilitli&&gelmediKayit?`<button class="btn-ghost" style="font-size:10px" onclick="event.stopPropagation();gelmediSil(${gelmediKayit.id},${o.id})">↩ İptal</button>`:""}
          ${!kilitli&&borclu?`<button class="btn f11" data-odemeAc="${o.id}" data-slotId="${s.id}" onclick="event.stopPropagation()">💰 Ödeme Al</button>`:""}
          <button class="btn-ghost f10" onclick="event.stopPropagation();modalChecklist(${o.id})">📋 Kayıtlar</button>
        </div>
      </div>`;
    });
  }
  return html;
}

  <div class="prog-grid">`;
  GUNLER.forEach((gun,gi)=>{
    const gs=gunSlotlar(gi).filter(s=>{
      if(_ogretmenFilter==="tumu") return true;
      const o=ogr.find(x=>x.id===s.oid);
      if(!o) return false;
      const slotOgr = s.ogretmen || o.ogretmen || "";
      if(!slotOgr) return true;
      return slotOgr===_ogretmenFilter;
    });
    const isT=gi===B_IDX,isY=gi===Y_IDX;
    const colStyle=`background:${isT?"var(--brown)":"var(--card)"};border:1px solid ${isT?"var(--lime-bd)":isY?"rgba(168,212,0,.35)":"var(--card-bd)"};`;
    html+=`<div class="prog-col" style="${colStyle}">
      <div style="padding:8px 9px;border-bottom:1px solid ${isT?"var(--lime-bd)":"var(--card-bd)"};display:flex;justify-content:space-between;align-items:center">
        <span class="f11 fw7 upper" style="letter-spacing:.08em;color:${isT?"var(--lime)":isY?"var(--lime-d)":"var(--txt-dim)"}">${GUN_SH[gi]}</span>
        ${isT?`<span style="width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 6px var(--lime);display:inline-block"></span>`:""}
        ${isY?`<span style="width:6px;height:6px;border-radius:50%;background:var(--lime-d);display:inline-block"></span>`:""}
      </div>
      <div style="padding:7px 6px">`;
    gs.forEach(s=>{
      const o=ogr.find(x=>x.id===s.oid);if(!o)return;
      const renk=ogrRenk(o.id);
      const slotDers = s.ders||o.ders||"Diğer";
      const dr = dersRenk(slotDers);
      const p=Math.min(paketDurSlot(o.id, s.id, drs, odm),4);
      html+=`<div class="prog-slot" style="background:${dr.bg};border:1px solid ${dr.border};box-shadow:0 2px 8px ${dr.glow}" data-checklistAc="${o.id}" title="${esc(o.isim)} — ${esc(slotDers)}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
          <div class="f11 fw7" style="color:${dr.text}">${s.saat}</div>
          <div style="font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;background:${dr.border}33;color:${dr.text};letter-spacing:.03em">${esc(slotDers.slice(0,3).toUpperCase())}</div>
        </div>
        <div class="f12 fw7 ellipsis" style="color:var(--txt);margin-bottom:2px">${esc(o.isim.split(" ")[0])}</div>
        ${s.ogretmen?`<div class="f9 ellipsis" style="color:${dr.text};opacity:.7">${esc(s.ogretmen.split(" ")[0])}</div>`:`<div class="f9 c-dim">${esc(o.ders||'')}</div>`}
        <div class="dots mt4">${[1,2,3,4].map(i=>`<div class="dot" style="width:6px;height:6px;border:1.5px solid ${i<=p?dr.text:"var(--brown-bd)"};background:${i<=p?dr.text:"transparent"}"></div>`).join("")}</div>
        <button style="position:absolute;top:3px;right:4px;background:none;border:none;color:${dr.border};cursor:pointer;font-size:13px;line-height:1;opacity:.6" data-slotSil="${s.id}">×</button>
      </div>`;
    });
    if(!gs.length) html+=`<div class="f11 text-center" style="color:var(--brown-bd);padding-top:14px">—</div>`;
    html+=`</div></div>`;
  });
  html+=`</div><div class="f11 c-dim text-center mt12">Kartlara tıklayarak ders geçmişini görüntüleyin</div>`;
  return html;
}

function renderHaftalik(){
  const hB=haftaBas(haftaOff),hBit=new Date(hB);hBit.setDate(hBit.getDate()+6);
  const hBStr=dateStr(hB),hBitStr=dateStr(hBit);
  const hOdm=odm.filter(o=>o.tarih>=hBStr&&o.tarih<=hBitStr);
  const hBekl=ogr.filter(o=>paketDur(o.id,drs,odm)>=3);
  const borclu=borcluList();

  let html=`<div class="flex flex-between flex-center flex-wrap gap8 mb22">
    <div class="page-title">Haftalık Ödemeler</div>
    <div class="flex flex-center gap8 flex-wrap">
      <button class="btn-ghost" id="hafta-prev">← Önceki</button>
      <div class="f13 c-mid text-center" style="min-width:180px">${hB.getDate()} ${AYLAR[hB.getMonth()]} — ${hBit.getDate()} ${AYLAR[hBit.getMonth()]}${haftaOff===0?` <span class="c-lime fw7 f11">BU HAFTA</span>`:""}</div>
      <button class="btn-ghost" id="hafta-next">Sonraki →</button>
      ${haftaOff!==0?`<button class="btn-o" id="hafta-reset" style="font-size:11px;padding:6px 12px">Bugüne Dön</button>`:""}

  </div>
  <div class="grid2 mb14">`;

  html+=`<div><div class="f10 fw7 upper ls1 c-dim mb8">Alınan Ödemeler</div><div class="card">`;
  if(!hOdm.length) html+=`<div class="p24 text-center f13 c-dim">Bu haftada ödeme kaydı yok.</div>`;
  hOdm.forEach(o=>{const og=ogr.find(x=>x.id===o.oid);const renk=ogrRenk(o.oid);
    html+=`<div class="card-row" style="cursor:default"><div style="width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0"></div>
      <div class="flex1"><div class="f13 fw5">${esc(og?.isim||"—")}</div><div class="f11 c-dim">${fmtD(o.tarih)}${o.slot_id?` · ${slotuBul(o.slot_id)}`:''}</div></div>
      <span class="badge" style="background:${renk}18;color:${renk}">${esc(og?.ders||"")}</span>
      <div class="f16 fw7" style="color:var(--green);flex-shrink:0">${fmtEur(o.tutar)}</div>
    </div>`;
  });
  if(hOdm.length) html+=`<div style="padding:10px 16px;display:flex;justify-content:flex-end;align-items:center;gap:8px;border-top:1px solid var(--brown-bd)"><span class="f11 c-dim upper ls1">Toplam</span><span class="f20 fw8 c-lime">${fmtEur(hOdm.reduce((s,o)=>s+o.tutar,0))}</span></div>`;
  html+=`</div></div>`;

  html+=`<div><div class="f10 fw7 upper ls1 c-dim mb8">Yaklaşan / Beklenen</div><div class="card">`;
  if(!hBekl.length) html+=`<div class="p24 text-center f13 c-dim">Yaklaşan ödeme yok.</div>`;
  hBekl.forEach(o=>{const paket=paketDur(o.id,drs,odm);const renk=ogrRenk(o.id);const doldu=paket>=4;
    html+=`<div class="card-row" style="cursor:default"><div style="width:7px;height:7px;border-radius:50%;background:${doldu?"var(--red)":"var(--lime)"};flex-shrink:0"></div>
      <div class="flex1"><div class="f13 fw5">${esc(o.isim)}</div>${_dotsRow(Math.min(paket,4),renk,doldu)}</div>
      <div class="text-right" style="flex-shrink:0"><div class="f16 fw7" style="color:${doldu?"var(--red)":"var(--lime)"}">${fmtEur(o.ucret)}</div>
        ${doldu?`<button class="btn mt4 f10" style="padding:4px 10px" data-odemeAc="${o.id}">Al</button>`:""}</div>
    </div>`;
  });
  html+=`</div></div></div>`;

  html+=`<div class="grid3">`;
  [[`Bu Hafta Tahsilat`,fmtEur(hOdm.reduce((s,o)=>s+o.tutar,0)),"var(--green)"],
   [`Beklenen Ödeme`,fmtEur(hBekl.reduce((s,o)=>s+o.ucret,0)),"var(--lime)"],
   [`Ödeme Bekleyen`,`${borclu.length} öğrenci`,"var(--red)"]].forEach(([l,v,c])=>{
    html+=`<div class="card p20"><div class="f10 fw6 upper ls1 c-dim mb8">${l}</div><div class="f24 fw8" style="color:${c}">${v}</div></div>`;
  });
  html+=`</div>`;

  // Son 6 ayın özeti
  const ayOzetler = [];
  for(let i=0; i<6; i++){
    const d = new Date(BU_YIL, BU_AY-i, 1);
    const ay = d.getMonth(), yil = d.getFullYear();
    const ayOdm = odm.filter(o=>o.ay===ay && o.yil===yil);
    ayOzetler.push({ay, yil, toplam: ayOdm.reduce((s,o)=>s+o.tutar,0), sayi: ayOdm.length});
  }
  const maxToplam = Math.max(...ayOzetler.map(x=>x.toplam), 1);

  html += `<div class="f10 fw7 upper ls1 c-dim mb10 mt18">Son 6 Ay Özeti</div>
    <div class="card p16">`;
  ayOzetler.forEach((a,i)=>{
    const pct = Math.round((a.toplam/maxToplam)*100);
    const isAktif = i===0;
    html += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:${i<5?'10':'0'}px">
      <div style="width:70px;font-size:11px;color:${isAktif?'var(--lime)':'var(--txt-dim)'};">${AYLAR[a.ay].slice(0,3)} ${a.yil}</div>
      <div style="flex:1;background:var(--brown-bd);border-radius:3px;height:18px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${isAktif?'var(--lime)':'var(--lime-dd)'};border-radius:3px;transition:width .3s"></div>
      </div>
      <div style="width:70px;text-align:right;font-size:12px;font-weight:700;color:${isAktif?'var(--lime)':'var(--txt-mid)'}">${fmtEur(a.toplam)}</div>
      <div style="width:45px;text-align:right;font-size:10px;color:var(--txt-dim)">${a.sayi} ödm</div>
    </div>`;
  });
  html += `</div>`;

  return html;
}

function slotuBul(slotId){
  const s = slot.find(x=>x.id===slotId);
  return s ? GUNLER[s.gun]+' '+s.saat : '';
}

function renderOgrenciler(){
  const _filtre = window._ogrFiltre || "isim";
  const _filtreDers = window._ogrFiltreDers || "tumu";
  const _filtreOgr = window._ogrFiltreOgr || "tumu";

  // Filtreleme
  let liste = [...ogr];
  if(_filtreDers !== "tumu") liste = liste.filter(o=>o.ders===_filtreDers);
  if(_filtreOgr !== "tumu") liste = liste.filter(o=>{
    // Öğrencinin herhangi bir slotunda bu öğretmen varsa göster
    const oSlotlar = slot.filter(s=>s.oid===o.id);
    const slotOgr = oSlotlar.some(s=>s.ogretmen===_filtreOgr);
    return slotOgr || o.ogretmen===_filtreOgr;
  });

  // Sıralama
  if(_filtre === "isim") liste.sort((a,b)=>a.isim.localeCompare(b.isim,"tr"));
  else if(_filtre === "ders") liste.sort((a,b)=>a.ders.localeCompare(b.ders,"tr"));
  else if(_filtre === "ucret") liste.sort((a,b)=>b.ucret-a.ucret);
  else if(_filtre === "odeme"){
    liste.sort((a,b)=>{
      const pa = paketDur(a.id,drs,odm);
      const pb = paketDur(b.id,drs,odm);
      return pb-pa; // En yakın ödeme önce
    });
  }

  const dersList = [...new Set(ogr.map(o=>o.ders))].sort();
  const ogrList  = [...new Set([
    ...ogr.map(o=>o.ogretmen).filter(Boolean),
    ...slot.map(s=>s.ogretmen).filter(Boolean)
  ])].sort();

  let html=`<div class="flex flex-between flex-center flex-wrap gap8 mb14">
    <div class="page-title">Öğrenci Listesi (${liste.length})</div>
    <div class="flex gap8 flex-wrap">
      <button class="btn-o" id="btn-duzenleAra">✏️ Öğrenci Düzenle</button>
      <button class="btn" id="btn-yeniOgr">+ Öğrenci Ekle</button>
    </div>
  </div>
  <div class="flex gap8 flex-wrap mb14" style="align-items:center">
    <div class="f11 fw6 c-dim upper ls1">Filtrele:</div>
    <select class="inp" id="ogr-filtre-ders" style="font-size:11px;padding:5px 8px;width:auto">
      <option value="tumu">Tüm Dersler</option>
      ${dersList.map(d=>`<option value="${d}" ${_filtreDers===d?"selected":""}>${d}</option>`).join("")}
    </select>
    <select class="inp" id="ogr-filtre-ogr" style="font-size:11px;padding:5px 8px;width:auto">
      <option value="tumu">Tüm Öğretmenler</option>
      ${ogrList.map(og=>`<option value="${og}" ${_filtreOgr===og?"selected":""}>${og}</option>`).join("")}
    </select>
    <div class="f11 fw6 c-dim upper ls1" style="margin-left:4px">Sırala:</div>
    ${[["isim","İsim"],["ders","Ders"],["ucret","Ücret"],["odeme","Ödeme"]].map(([v,l])=>
      `<button onclick="window._ogrFiltre='${v}';render()" class="${_filtre===v?"btn":"btn-ghost"}" style="font-size:11px;padding:5px 10px">${l}</button>`
    ).join("")}
  </div>
  <div id="ogr-arama-wrap"></div>
  <div class="card">`;
  if(!liste.length) html+=`<div class="p24 text-center f13 c-dim">${ogr.length?'Filtre sonucu boş.':'Henüz öğrenci eklenmedi.'}</div>`;
  liste.forEach((o,i)=>{
    const idx = ogr.indexOf(o);
    const renk=RENKLER[idx%RENKLER.length];
    const ogSlotlar=slot.filter(s=>s.oid===o.id);
    // Check if any slot is overdue
    const hicOdeme = odm.filter(x=>x.oid===o.id).length===0;
    const hicDers  = drs.filter(x=>x.oid===o.id).length===0;
    const borclu = ogSlotlar.length
      ? ogSlotlar.some(s=>paketDurSlot(o.id,s.id,drs,odm)>=4) || (hicOdeme && !hicDers)
      : paketDur(o.id,drs,odm)>=4 || (hicOdeme && !hicDers);
    const odemeKayitBekliyor = hicOdeme && hicDers;
    html+=`<div class="card-row" data-ogrDetay="${o.id}" style="cursor:pointer">
      <div style="width:40px;height:40px;border-radius:50%;background:${renk}22;color:${renk};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0">${esc(o.isim.charAt(0))}</div>
      <div class="flex1 mw0">
        <div class="flex flex-center gap8 flex-wrap">
          <span class="f14 fw6">${esc(o.isim)}</span>
          ${odemeKayitBekliyor
            ? `<span class="badge" style="background:#1a0f00;color:#f59e0b;border:1px solid #f59e0b">💳 Kayıt Ödemesi Bekleniyor</span>`
            : borclu
            ? `<span class="badge badge-red">⚠ Ödeme Bekliyor</span>`
            : ""}
        </div>
        <div class="f12 c-dim mt4 ellipsis">${esc(o.ders)}${o.ogretmen?' · '+esc(o.ogretmen):''}${o.tel?` · ${esc(o.tel)}`:""}${ogSlotlar.length?` · ${ogSlotlar.map(s=>(s.ders||o.ders)+" "+GUN_SH[s.gun]+" "+s.saat).join(", ")}`:""}
        </div>
      </div>
      <div class="text-right" style="flex-shrink:0">
        <div class="f13 fw7 c-lime">${fmtEur(o.ucret)}</div>
        ${dotsHtml(o.id,renk)}
        <button onclick="event.stopPropagation();modalChecklist(${o.id})" class="btn-ghost" style="font-size:11px;padding:5px 10px;margin-top:4px">📋 Kayıtlar</button>
      </div>
    </div>`;
  });
  html+=`</div>`;
  return html;
}

function renderGecikme(){
  const borclu = borcluList();
  const kayitBekleyen = odemeKayitBekleyenler();
  const toplamBekleyen = [...new Set([...borclu.map(o=>o.id), ...kayitBekleyen.map(o=>o.id)])].length;

  let html = `<div class="page-title mb18">Bekleyen Ödemeler</div>`;

  if(!toplamBekleyen){
    html+=`<div class="card p24 text-center"><div style="font-size:36px;margin-bottom:12px">🎉</div><div class="f20 fw7" style="color:var(--green)">Bekleyen ödeme yok!</div></div>`;

  // Kayıt ödemesi bekleyenler (henüz derse gelmemiş)

        <div class="flex1" style="min-width:160px">
          <div class="f14 fw6">${esc(o.isim)}</div>
          <div class="f12 c-dim mt4">${esc(o.ders)}${o.tel?` · ${esc(o.tel)}`:""}</div>
          <div class="f11 mt4" style="color:#f59e0b">Henüz ödeme alınmadı — yeni kayıt</div>
        </div>
        <div class="f18 fw8" style="color:#f59e0b">${fmtEur(o.ucret)}</div>
        <button class="btn f12" onclick="modalOdeme(${o.id},undefined,'kayit')" style="background:#f59e0b;color:#0d0d0b">💳 Kayıt Ödemesi Al</button>
      </div>`;
    });
    html+=`</div>`;
  }

  // 4 dersi dolan öğrenciler
  const paketDoldu = borclu.filter(o => paketDur(o.id,drs,odm)>=4 || (odm.filter(x=>x.oid===o.id).length>0 && drs.filter(x=>x.oid===o.id).length>=4));
  if(paketDoldu.length){
    html+=`<div class="f11 fw7 upper ls1 mb8 c-red">⚠ Paketi Dolan Öğrenciler (${paketDoldu.length})</div>
      <div class="card">`;
    paketDoldu.forEach(o=>{
      const renk=ogrRenk(o.id);
      html+=`<div class="card-row flex-wrap" style="cursor:default">
        <div class="flex1" style="min-width:160px">
          <div class="f14 fw6">${esc(o.isim)}</div>
          <div class="f12 c-dim mt4">${esc(o.ders)}${o.tel?` · ${esc(o.tel)}`:""}</div>
          ${dotsHtml(o.id,renk)}
        </div>
        <div class="f20 fw8 c-lime">${fmtEur(o.ucret)}</div>
        <button class="btn f12" onclick="modalChecklist(${o.id})">💰 Ödeme Al</button>
      </div>`;
    });
    html+=`</div>`;
  }

  return html;
}

function renderGecmis(){
  if(!odm.length){
    return `<div class="page-title mb18">Ödeme Geçmişi</div>
      <div class="card p24 text-center f13 c-dim">Henüz ödeme kaydı yok.</div>`;
  }

  // Tüm ödemeleri ay bazında grupla
  const ayGruplari = {};
  [...odm].sort((a,b)=>b.tarih.localeCompare(a.tarih)).forEach(o=>{
    const key = `${o.yil}-${String(o.ay+1).padStart(2,"0")}`;
    if(!ayGruplari[key]) ayGruplari[key] = {yil:o.yil, ay:o.ay, odemeler:[], toplam:0};
    ayGruplari[key].odemeler.push(o);
    ayGruplari[key].toplam += o.tutar;
  });

  const ayKeys = Object.keys(ayGruplari).sort().reverse();
  const genelToplam = odm.reduce((s,o)=>s+o.tutar,0);
  const buAyKey = `${BU_YIL}-${String(BU_AY+1).padStart(2,"0")}`;
  const buAyToplam = ayGruplari[buAyKey]?.toplam || 0;
  const gecenAyD = new Date(BU_YIL, BU_AY-1, 1);
  const gecenAyKey = `${gecenAyD.getFullYear()}-${String(gecenAyD.getMonth()+1).padStart(2,"0")}`;
  const gecenAyToplam = ayGruplari[gecenAyKey]?.toplam || 0;

  let html = `<div class="page-title mb18">Ödeme Geçmişi</div>`;

  // Özet kartlar
  html += `<div class="grid3 mb18">
    <div class="card p20">
      <div class="f10 fw6 upper ls1 c-dim mb6">Bu Ay</div>
      <div class="f24 fw8 c-lime">${fmtEur(buAyToplam)}</div>
      <div class="f11 c-dim mt4">${AYLAR[BU_AY]} ${BU_YIL}</div>
    </div>
    <div class="card p20">
      <div class="f10 fw6 upper ls1 c-dim mb6">Geçen Ay</div>
      <div class="f24 fw8" style="color:var(--txt-mid)">${fmtEur(gecenAyToplam)}</div>
      <div class="f11 c-dim mt4">${AYLAR[gecenAyD.getMonth()]} ${gecenAyD.getFullYear()}</div>
    </div>
    <div class="card p20">
      <div class="f10 fw6 upper ls1 c-dim mb6">Toplam</div>
      <div class="f24 fw8 c-lime">${fmtEur(genelToplam)}</div>
      <div class="f11 c-dim mt4">${odm.length} ödeme</div>
    </div>
  </div>`;

  // Her ay için grup
  ayKeys.forEach(key => {
    const grp = ayGruplari[key];
    const isAktif = key === buAyKey;
    html += `<div style="margin-bottom:18px">
      <div class="flex flex-between flex-center mb8">
        <div class="flex flex-center gap8">
          <div class="f14 fw7" style="color:${isAktif?'var(--lime)':'var(--txt-mid)'}">${AYLAR[grp.ay]} ${grp.yil}</div>
          ${isAktif?`<span class="badge badge-lime">Bu Ay</span>`:''}
        </div>
        <div class="f16 fw7 c-lime">${fmtEur(grp.toplam)}</div>
      </div>
      <div class="card">`;
    grp.odemeler.forEach(o=>{
      const og=ogr.find(x=>x.id===o.oid);
      const renk=ogrRenk(o.oid);
      const slotBilgi = o.slot_id ? ` · ${slotuBul(o.slot_id)}` : '';
      const isErken = o.tip==="erken";
      html+=`<div class="card-row" style="cursor:default${isErken?';background:var(--blue-bg)':''}">
        <div style="width:8px;height:8px;border-radius:50%;background:${isErken?'var(--blue)':'var(--green)'};flex-shrink:0"></div>
        <div class="flex1 mw0">
          <div class="f13 fw6 ellipsis">${esc(og?.isim||"—")}</div>
          <div class="f11 c-dim">${fmtD(o.tarih)}${slotBilgi} · ${esc(o.aciklama)}</div>
        </div>
        ${o.tip==="kayit"
          ? `<span class="badge" style="background:var(--lime-bg);color:var(--lime);border:1px solid var(--lime-bd);flex-shrink:0">🎓 Kayıt</span>`
          : isErken
          ? `<span class="badge" style="background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue);flex-shrink:0">⚡ Erken</span>`
          : `<span class="badge" style="background:${renk}18;color:${renk};flex-shrink:0">${esc(og?.ders||'')}</span>`}
        <div class="f15 fw7" style="color:${o.tip==="kayit"?'var(--lime)':isErken?'var(--blue)':'var(--lime)'};flex-shrink:0">${fmtEur(o.tutar)}</div>
      </div>`;
    });
    html += `</div></div>`;
  });

  return html;
}

function showOverlay(html){
  const ov=$("overlay");
  ov.innerHTML=`<div class="modal pop">${html}</div>`;
  ov.className="overlay";
  ov.style.display="flex";
  ov.onclick=e=>{if(e.target===ov)closeOverlay();};
}
function closeOverlay(){$("overlay").style.display="none";}

function modalOdeme(preOid, preSlotId, preType){
  const o = preOid ? ogr.find(x=>x.id===preOid) : null;
  const ogSlotlar = preOid ? slot.filter(s=>s.oid===preOid) : [];
  const mevcutPaket = preOid ? paketDur(preOid, drs, odm) : 0;

  function slotDropdown(slotlar, selId){

      <select class="inp" id="f-slot-id">

    <div><div class="lbl">Öğrenci *</div>

          </div>
        </label>
      </div>
    </div>

    <div id="erken-bilgi" style="display:${preType==="erken"?"block":"none"};background:var(--blue-bg);border:1px solid var(--blue);border-radius:6px;padding:10px 12px;font-size:11px;color:var(--blue)">

    const paketAktif = document.getElementById('tip-paket').checked;

    pl.style.border = paketAktif ? '2px solid var(--lime)' : '2px solid var(--brown-bd)';

  document.getElementById('tip-paket').onchange = updateTipUI;

    const tarihVal = $("f-tarih").value || today();

    const slotEl = document.getElementById("f-slot-id");
    const slotId = slotEl ? Number(slotEl.value)||null : null;
    const tarihD = new Date(tarihVal);
    const ay = tarihD.getMonth();
    const yil = tarihD.getFullYear();
    const defaultAciklama = tip==='erken' ? 'Erken ödeme' : '4 ders paketi';
    odm.push({id:nid(), oid, tutar, tarih:tarihVal, aciklama:aciklama||defaultAciklama, ay, yil, slot_id:slotId, tip});
    persist(); closeOverlay(); render();
  };
}

        onmouseover="this.style.borderColor='var(--lime-bd)'" onmouseout="this.style.borderColor='var(--brown-bd)'">
        <div class="f14 fw6">${esc(o.isim)}</div>
        <div class="f11 c-dim">${esc(o.ders)}${o.ogretmen ? ' · ' + esc(o.ogretmen) : ''}</div>
      </div>`
    ).join('');
  };
}

function gosterDuzenleForm(oid){
  const o = ogr.find(x => x.id === oid);
  if(!o) return;

  const dersOpts = DERS_T.map(d => `<option ${o.ders===d?'selected':''}>${d}</option>`).join('');
  const ogretOpts = `<option value="">—</option>` + OGRETMENLER.map(og => `<option value="${og}" ${(o.ogretmen||'')===og?'selected':''}>${og}</option>`).join('');

  const formHTML = `<div class="modal-title">✏️ ${esc(o.isim)}</div>
    <div class="form-col">
      <div><div class="lbl">İsim</div><input class="inp" id="ed-isim" value="${esc(o.isim)}"></div>
      <div class="grid2">
        <div><div class="lbl">Ders Türü</div><select class="inp" id="ed-ders">${dersOpts}</select></div>
        <div><div class="lbl">Öğretmen</div><select class="inp" id="ed-ogretmen">${ogretOpts}</select></div>
      </div>
      <div class="grid2">
        <div><div class="lbl">Telefon</div><input class="inp" id="ed-tel" value="${esc(o.tel||'')}"></div>
        <div><div class="lbl">Ücret (€)</div><input class="inp" type="number" id="ed-ucret" value="${o.ucret||0}"></div>
      </div>
      <div><div class="lbl">Notlar</div><textarea class="inp" id="ed-notlar" rows="2">${esc(o.notlar||'')}</textarea></div>
      <div class="flex gap8 flex-end mt4 flex-wrap" style="gap:6px">
        <button class="btn-o" id="ed-geri-btn" style="font-size:11px">← Geri</button>
        <button class="btn-o" onclick="closeOverlay();setTimeout(()=>modalOdeme(${oid},undefined,'erken'),80)" style="color:var(--blue);border-color:var(--blue);font-size:11px">⚡ Erken Ödeme</button>
        <button class="btn-o" onclick="closeOverlay();setTimeout(()=>modalOdeme(${oid}),80)" style="color:var(--green);border-color:var(--green);font-size:11px">💰 Ödeme Al</button>
        <button class="btn" onclick="kaydetDuzenle(${oid})" style="font-size:11px">💾 Kaydet</button>
      </div>
    </div>`;

  // modalDuzenleAra içinden mi yoksa direkt mi açıldı?
  const araForm = document.getElementById('ara-form');
  const araSonuclar = document.getElementById('ara-sonuclar');

  if(araForm){
    // modalDuzenleAra içinde: forma yaz
    if(araSonuclar) araSonuclar.innerHTML = '';
    araForm.innerHTML = '<div style="background:var(--brown);border:1px solid var(--lime-bd);border-radius:8px;padding:16px;margin-top:8px">' + formHTML + '</div>';
    document.getElementById('ed-geri-btn').onclick = () => {
      araForm.innerHTML = '';
      const araInput = document.getElementById('ara-input');
      if(araInput){ araInput.value = ''; araInput.focus(); }
    };
  } else {
    // Direkt çağrı (Kayıtlar modalından): overlay'i kullan
    showOverlay(formHTML);
    document.getElementById('ed-geri-btn').onclick = () => modalChecklist(oid);
  }
}

function kaydetDuzenle(oid){
  const o = ogr.find(x => x.id === oid);
  if(!o) return;
  const isim = document.getElementById('ed-isim').value.trim();
  if(!isim){ alert('İsim boş olamaz'); return; }
  o.isim = isim;
  o.ders = document.getElementById('ed-ders').value;
  o.ogretmen = document.getElementById('ed-ogretmen').value;
  o.tel = document.getElementById('ed-tel').value.trim();
  o.ucret = +document.getElementById('ed-ucret').value || 0;
  o.notlar = document.getElementById('ed-notlar').value.trim();
  persist();
  closeOverlay();
  render();
}

function modalOgrDuzenle(oid){ modalDuzenleAra(); setTimeout(()=>gosterDuzenleForm(oid),100); }

/* ══════════════════════════
   KAYITLAR MODALI (Slot bazlı)
══════════════════════════ */
function modalChecklist(oid){
  const o=ogr.find(x=>x.id===oid);if(!o)return;
  const renk=ogrRenk(o.id);
  const ogSlotlar=slot.filter(s=>s.oid===oid);
  
  // Header
  let html = `
    <div class="flex flex-between flex-center mb16">
      <div class="flex flex-center gap12">
        <div style="width:44px;height:44px;border-radius:50%;background:${renk}22;color:${renk};display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0">${esc(o.isim.charAt(0))}</div>
        <div>
          <div class="f18 fw7 c-lime">${esc(o.isim)}</div>
          <div class="f11 c-dim">${esc(o.ders)}${o.ogretmen?' · '+esc(o.ogretmen):''} · ${fmtEur(o.ucret)}/paket</div>
        </div>
      </div>
      <button onclick="gosterDuzenleForm(${oid})" class="btn-o" style="font-size:12px;padding:7px 12px;flex-shrink:0">✏️ Düzenle</button>
    </div>`;

  if(ogSlotlar.length === 0){
    // No slots: single packet view
    html += slotPaketHTML(oid, null, 'Genel Paket', renk);
  } else if(ogSlotlar.length === 1){
    // Single slot
    const s = ogSlotlar[0];
    html += slotPaketHTML(oid, s.id, `${s.ders||o.ders} — ${GUNLER[s.gun]} ${s.saat}`, renk);
  } else {
    // Multiple slots: each gets its own section
    ogSlotlar.forEach(s => {
      html += slotPaketHTML(oid, s.id, `${s.ders||o.ders} — ${GUNLER[s.gun]} ${s.saat}`, renk);
    });
  }

  // Gelmedi kayıtları
  const ogGmd = [...gmd.filter(x=>x.oid===oid)].sort((a,b)=>b.tarih.localeCompare(a.tarih));
  if(ogGmd.length){
    html += `<div class="f11 fw7 upper ls1 c-dim mb8 mt4" style="color:var(--red)">Gelmedi Kayıtları (${ogGmd.length})</div>
      <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:14px">`;
    ogGmd.slice(0,5).forEach(g=>{
      const slotBilgi = g.slotId ? ` · ${slotuBul(g.slotId)}` : '';
      html += `<div style="background:var(--red-bg);border:1px solid var(--red);border-radius:6px;padding:7px 12px;display:flex;justify-content:space-between;align-items:center">
        <span class="f12" style="color:var(--red)">😔 ${fmtD(g.tarih)} ${g.saat||''}${slotBilgi}</span>
        <button onclick="gelmediSil(${g.id},${oid});modalChecklist(${oid})" style="background:transparent;border:none;color:var(--txt-dim);cursor:pointer;font-size:11px">× Sil</button>
      </div>`;
    });
    if(ogGmd.length>5) html += `<div class="f11 c-dim text-center">+${ogGmd.length-5} daha…</div>`;
    html += `</div>`;
  }

  // Payment history
  const ogOdm=[...odm.filter(x=>x.oid===oid)].sort((a,b)=>b.tarih.localeCompare(a.tarih));
  html += `<div class="f11 fw7 upper ls1 c-dim mb8 mt4">Ödeme Geçmişi (${ogOdm.length})</div>
    <div style="max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:16px">`;
  if(!ogOdm.length){
    html += `<div class="f12 c-dim">Henüz ödeme kaydı yok.</div>`;
  } else {
    ogOdm.forEach(od => {
      const slotBilgi = od.slot_id ? ` · ${slotuBul(od.slot_id)}` : '';
      html += `<div style="background:var(--brown);border:1px solid var(--lime-dd);border-radius:6px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center">
        <div><span class="f12 fw6" style="color:var(--green)">${fmtEur(od.tutar)}</span><span class="f11 c-dim"> · ${fmtD(od.tarih)}${slotBilgi}</span></div>
        <span class="f11 c-dim">${esc(od.aciklama)}</span>
      </div>`;
    });
  }
  html += `</div>
    <div class="flex flex-between flex-center mt4">
      <button class="btn-danger" onclick="ogrSil(${oid})">🗑 Öğrenciyi Sil</button>
      <button class="btn-o" onclick="closeOverlay()">Kapat</button>
    </div>`;

  showOverlay(html);
}

function ogrSil(oid){
  const o = ogr.find(x=>x.id===oid);
  if(!o) return;
  if(!confirm(o.isim + " silinsin mi?\nTüm ders ve ödeme kayıtları da silinecek.")) return;
  ogr  = ogr.filter(x=>x.id!==oid);
  slot = slot.filter(x=>x.oid!==oid);
  drs  = drs.filter(x=>x.oid!==oid);
  odm  = odm.filter(x=>x.oid!==oid);
  persist(); closeOverlay(); render();
}

function slotPaketHTML(oid, slotId, baslik, renk){
  const mevcutDrsList = slotMevcutDrs(oid, slotId);
  const mevcutSayisi = mevcutDrsList.length;
  const paketDolu = mevcutSayisi >= 4;

  const kutucuklar = [0,1,2,3].map(i => {
    const d = mevcutDrsList[i];
    if(d){
      return `<div onclick="drsSil(${d.id},${oid})" title="Tıkla: bu dersi sil" style="
        width:68px;height:68px;border-radius:8px;
        background:var(--lime-bg);border:2px solid var(--lime);
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        cursor:pointer;gap:2px;transition:all .15s"
        onmouseover="this.style.background='var(--red-bg)';this.style.borderColor='var(--red)'"
        onmouseout="this.style.background='var(--lime-bg)';this.style.borderColor='var(--lime)'">
        <div style="font-size:18px;font-weight:700;color:var(--lime)">✓</div>
        <div style="font-size:9px;color:var(--txt-dim);text-align:center;line-height:1.2">${fmtD(d.tarih)}</div>
        <div style="font-size:8px;color:var(--red);opacity:.7">× sil</div>
      </div>`;
    } else {
      return `<div onclick="drsEkleKutucuk(${oid},${slotId||'null'})" title="Tıkla: bugün ders ekle" style="
        width:68px;height:68px;border-radius:8px;
        background:transparent;border:2px dashed var(--brown-bd);
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        cursor:pointer;gap:2px;transition:all .15s"
        onmouseover="this.style.background='var(--lime-bg)';this.style.borderColor='var(--lime)'"
        onmouseout="this.style.background='transparent';this.style.borderColor='var(--brown-bd)'">
        <div style="font-size:22px;color:var(--brown-bd)">+</div>
        <div style="font-size:9px;color:var(--brown-bd)">ekle</div>
      </div>`;
    }
  }).join('');

  const slotKey = slotId || 'null';
  return `<div style="background:var(--brown);border:1px solid ${paketDolu?'var(--red)':'var(--lime-bd)'};border-radius:10px;padding:14px 16px;margin-bottom:12px">
    <div class="flex flex-between flex-center mb10">
      <div class="f12 fw7" style="color:${paketDolu?'var(--red)':'var(--lime)'}">${baslik} — ${mevcutSayisi}/4</div>
      ${paketDolu?`<span class="badge badge-red">⚠ ÖDEME GEREKİYOR</span>`:`<span class="badge" style="background:var(--lime-bg);color:var(--lime)">Devam ediyor</span>`}
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">${kutucuklar}</div>
    <div class="f10 c-dim mb8">Boş → bugün ekle &nbsp;·&nbsp; Dolu → sil</div>
    <div class="flex gap6 flex-wrap">
      <input type="date" id="cl-tarih-${slotKey}" class="inp" value="${today()}" style="width:130px;font-size:11px;padding:5px 8px">
      <input type="time" id="cl-saat-${slotKey}" class="inp" placeholder="Saat" style="width:85px;font-size:11px;padding:5px 8px">
      <button class="btn-o" onclick="drsEkleManuel(${oid},${slotKey})" style="font-size:11px;padding:5px 10px">+ Tarih Seç Ekle</button>
      ${paketDolu?`<button class="btn" onclick="odemeAlVeSifirla(${oid},${slotKey})" style="background:var(--green);font-size:11px;padding:5px 10px">💰 Ödeme Al</button>`:''}
    </div>
  </div>`;
}

function drsEkleKutucuk(oid, slotId){
  const sid = (slotId===null||slotId===undefined||slotId==='null') ? null : Number(slotId);
  drs.push({id:nid(), oid, tarih:today(), saat:'', slot_id:sid});
  persist();
  modalChecklist(oid);
}

function drsEkleManuel(oid, slotId){
  const sid = (slotId===null||slotId===undefined||slotId==='null') ? null : Number(slotId);
  const slotKey = sid || 'null';
  const tarihEl = document.getElementById('cl-tarih-'+slotKey);
  const saatEl = document.getElementById('cl-saat-'+slotKey);
  if(!tarihEl){ alert('Tarih alanı bulunamadı'); return; }
  const tarih = tarihEl.value;
  if(!tarih){ alert('Tarih seçin'); return; }
  const saat = saatEl ? saatEl.value : '';
  drs.push({id:nid(), oid, tarih, saat, slot_id:sid});
  persist();
  modalChecklist(oid);
}

function drsSil(drsId, oid){
  if(!confirm('Bu ders kaydı silinsin mi?')) return;
  drs = drs.filter(x => x.id !== drsId);
  persist();
  modalChecklist(oid);
}

function odemeAlVeSifirla(oid, slotId){
  const sid = (slotId===null||slotId===undefined||slotId==='null') ? null : Number(slotId);
  const o = ogr.find(x => x.id === oid);
  if(!o) return;
  // Erken ödeme var mı kontrol et
  const erkenOdeme = odm.find(x => x.oid===oid && x.tip==="erken" && (sid ? x.slot_id===sid : !x.slot_id));
  closeOverlay();
  setTimeout(()=>{
    modalOdeme(oid, sid || undefined, erkenOdeme ? "paket_onceden_odendi" : "paket");
  }, 80);
}



function renderMuhasebe(){
  // ── Temel istatistikler ──
  const toplamOgr = ogr.length;
  const toplamSlot = slot.length;
  const borcluSayisi = borcluList().length;
  const toplamOdm = odm.reduce((s,o)=>s+o.tutar, 0);
  const buAyOdm = odm.filter(o=>o.ay===BU_AY&&o.yil===BU_YIL).reduce((s,o)=>s+o.tutar,0);
  const gecenAyD = new Date(BU_YIL,BU_AY-1,1);
  const gecenAyOdm = odm.filter(o=>o.ay===gecenAyD.getMonth()&&o.yil===gecenAyD.getFullYear()).reduce((s,o)=>s+o.tutar,0);
  const aylikPotansiyel = ogr.reduce((s,o)=>{
    const oSlotlar = slot.filter(sl=>sl.oid===o.id);
    return s + (oSlotlar.length||1) * o.ucret;
  }, 0);
  const toplamGelmedi = gmd.length;

  // ── Ders bazlı ──
  const dersBazli = {};
  DERS_T.forEach(d=>{dersBazli[d]={ogr:0,slot:0,aylik:0};});
  ogr.forEach(o=>{
    const oSlotlar = slot.filter(s=>s.oid===o.id);
    if(!oSlotlar.length){
      // Slot yok: öğrenci düzeyinde ders
      const d = o.ders||"Diğer";
      if(!dersBazli[d]) dersBazli[d]={ogr:0,slot:0,aylik:0};
      dersBazli[d].ogr++;
      dersBazli[d].aylik += o.ucret;
    } else {
      // Slot var: her slot kendi dersine sayılır
      const sayilanDersler = new Set();
      oSlotlar.forEach(s=>{
        const d = s.ders||o.ders||"Diğer";
        if(!dersBazli[d]) dersBazli[d]={ogr:0,slot:0,aylik:0};
        dersBazli[d].slot++;
        dersBazli[d].aylik += o.ucret; // Her slot bağımsız ücret
        if(!sayilanDersler.has(d)){
          dersBazli[d].ogr++; // Her ders türü için öğrenciyi 1x say
          sayilanDersler.add(d);
        }
      });
    }
  });

  // ── Öğretmen bazlı ──
  const ogrBazli = {};
  OGRETMENLER.forEach(og=>{ogrBazli[og]={ogr:new Set(),slot:0,aylik:0,buAy:0,buAyErken:0};});
  ogrBazli["Atanmamış"] = {ogr:new Set(),slot:0,aylik:0,buAy:0,buAyErken:0};

  ogr.forEach(o=>{
    const oSlotlar = slot.filter(s=>s.oid===o.id);
    if(!oSlotlar.length){
      const key = o.ogretmen||"Atanmamış";
      if(!ogrBazli[key]) ogrBazli[key]={ogr:new Set(),slot:0,aylik:0,buAy:0};
      ogrBazli[key].ogr.add(o.id);
      ogrBazli[key].aylik += o.ucret;
    } else {
      oSlotlar.forEach(s=>{
        const key = s.ogretmen||o.ogretmen||"Atanmamış";
        if(!ogrBazli[key]) ogrBazli[key]={ogr:new Set(),slot:0,aylik:0,buAy:0};
        ogrBazli[key].ogr.add(o.id);
        ogrBazli[key].slot++;
        ogrBazli[key].aylik += o.ucret;
      });
    }
  });
  // Bu ay öğretmen bazlı gelir
  odm.filter(o=>o.ay===BU_AY&&o.yil===BU_YIL).forEach(od=>{
    const og2 = ogr.find(x=>x.id===od.oid);
    if(!og2) return;
    const oSlotlar = slot.filter(s=>s.oid===og2.id);
    const key = (od.slot_id ? (oSlotlar.find(s=>s.id===od.slot_id)?.ogretmen) : null) || og2.ogretmen || "Atanmamış";
    if(!ogrBazli[key]) ogrBazli[key]={ogr:new Set(),slot:0,aylik:0,buAy:0,buAyErken:0};
    if(od.tip==="erken") ogrBazli[key].buAyErken = (ogrBazli[key].buAyErken||0) + od.tutar;
    else ogrBazli[key].buAy += od.tutar;
  });

  // ── Son 12 ay ──
  const sonAylar = [];
  for(let i=11;i>=0;i--){
    const d=new Date(BU_YIL,BU_AY-i,1);
    const ay=d.getMonth(),yil=d.getFullYear();
    const toplam=odm.filter(o=>o.ay===ay&&o.yil===yil).reduce((s,o)=>s+o.tutar,0);
    const sayi=odm.filter(o=>o.ay===ay&&o.yil===yil).length;
    sonAylar.push({ay,yil,toplam,sayi,label:AYLAR[ay].slice(0,3)+" '"+String(yil).slice(2)});
  }
  const maxAy = Math.max(...sonAylar.map(x=>x.toplam), 1);

  let html = `<div class="page-title mb18">📊 Muhasebe & Raporlar</div>`;

  // ── Özet kartlar ──
  html += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px">`;
  [
    ["👥 Toplam Öğrenci", toplamOgr+" kişi", "var(--lime)"],
    ["📅 Toplam Slot", toplamSlot+" slot", "var(--lime)"],
    ["💰 Bu Ay", fmtEur(buAyOdm), "var(--green)"],
    ["📆 Geçen Ay", fmtEur(gecenAyOdm), "var(--txt-mid)"],
    ["🎯 Aylık Potansiyel", fmtEur(aylikPotansiyel), "var(--lime)"],
    ["📈 Toplam Gelir", fmtEur(toplamOdm), "var(--green)"],
    ["⚠ Ödeme Bekleyen", borcluSayisi+" öğrenci", borcluSayisi>0?"var(--red)":"var(--green)"],
    ["⚡ Erken Ödeme", fmtEur(odm.filter(o=>o.tip==="erken"&&o.ay===BU_AY&&o.yil===BU_YIL).reduce((s,o)=>s+o.tutar,0)), "var(--blue)"],
    ["🎓 Yeni Kayıt", fmtEur(odm.filter(o=>o.tip==="kayit"&&o.ay===BU_AY&&o.yil===BU_YIL).reduce((s,o)=>s+o.tutar,0)), "var(--lime)"],
    ["😔 Gelmedi Kaydı", toplamGelmedi+" ders", toplamGelmedi>0?"var(--red)":"var(--txt-dim)"],
  ].forEach(([l,v,c])=>{
    html+=`<div class="card p16"><div class="f10 fw6 upper ls1 c-dim mb6">${l}</div><div class="f20 fw8" style="color:${c}">${v}</div></div>`;
  });
  html += `</div>`;

  // ── 12 aylık bar chart ──
  html += `<div class="card p20 mb16">
    <div class="f13 fw7 c-lime mb14">Son 12 Ay Gelir Grafiği</div>
    <div style="display:flex;align-items:flex-end;gap:6px;height:100px">`;
  sonAylar.forEach((a,i)=>{
    const h = Math.max(Math.round((a.toplam/maxAy)*90), a.toplam>0?4:0);
    const isAktif = i===11;
    html+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="font-size:9px;color:${isAktif?'var(--lime)':'var(--txt-dim)'};font-weight:${isAktif?'700':'400'}">${a.toplam>0?fmtEur(a.toplam):''}</div>
      <div style="width:100%;height:${h}px;background:${isAktif?'var(--lime)':'var(--lime-dd)'};border-radius:3px 3px 0 0;min-height:${a.toplam>0?4:0}px"></div>
      <div style="font-size:9px;color:${isAktif?'var(--lime)':'var(--txt-dim)'};text-align:center;white-space:nowrap">${a.label}</div>
    </div>`;
  });
  html += `</div></div>`;

  // ── Ders bazlı tablo ──
  html += `<div class="grid2 mb16">`;
  html += `<div class="card p16">
    <div class="f13 fw7 c-lime mb12">Derse Göre Dağılım</div>`;
  const aktifDersler = Object.entries(dersBazli).filter(([,v])=>v.ogr>0||v.slot>0).sort((a,b)=>b[1].slot+b[1].ogr - (a[1].slot+a[1].ogr));
  if(!aktifDersler.length){
    html+=`<div class="f12 c-dim">Henüz ders kaydı yok.</div>`;
  } else {
    aktifDersler.forEach(([ders,v])=>{
      const dr3 = dersRenk(ders);
      html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;margin-bottom:5px;border-radius:6px;background:${dr3.bg};border:1px solid ${dr3.border}33">
        <div class="flex flex-center gap8">
          <div style="width:4px;height:36px;border-radius:2px;background:${dr3.border};flex-shrink:0"></div>
          <div>
            <div class="f13 fw7" style="color:${dr3.text}">${esc(ders)}</div>
            <div class="f10 c-dim">${v.ogr} öğrenci · ${v.slot} slot</div>
          </div>
        </div>

function render(){

  $("tarih-str").textContent=`${GUNLER[B_IDX]}, ${BUGUN.getDate()} ${AYLAR[BU_AY]} ${BU_YIL}`;
  const bl=borcluList();

  // Tabs highlight
  document.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.classList.toggle("active",btn.dataset.tab===activeTab);
  });

  // Main content
  const main=$("main");
  switch(activeTab){
    case "bugun":   main.innerHTML=renderBugun(today(),B_IDX,false); break;
    case "yarin":   main.innerHTML=renderBugun(tmrw(),Y_IDX,true);  break;
    case "program": main.innerHTML=renderProgram(); break;
    case "haftalik":main.innerHTML=renderHaftalik(); break;
    case "ogrenciler":main.innerHTML=renderOgrenciler(); break;
    case "gecikme": main.innerHTML=renderGecikme(); break;
    case "gecmis":  main.innerHTML=renderGecmis(); break;
    case "muhasebe":main.innerHTML=renderMuhasebe(); break;
  }

  // Event delegation
  main.onclick=e=>{
    // Check specific data attributes first (most specific wins)
    const chk = e.target.closest("[data-dersAl],[data-dersGeri],[data-odemeAc],[data-checklistAc],[data-ogrDetay],[data-slotSil]");
    if(chk){
      if(chk.dataset.dersAl){
        const oid=+chk.dataset.dersAl;
        const slotId=chk.dataset.slotId?+chk.dataset.slotId:null;
        drs.push({id:nid(),oid,tarih:today(),saat:'',slot_id:slotId});persist();render();
        const p=paketDurSlot(oid,slotId,drs,odm);
        if(p>=4){const o=ogr.find(x=>x.id===oid);if(o)showPaketUyari(o);}
        return;
      } else if(chk.dataset.dersGeri){
        const oid=+chk.dataset.dersGeri;
        const slotId=chk.dataset.slotId?+chk.dataset.slotId:null;
        const b=drs.filter(d=>d.oid===oid&&d.tarih===today()&&(slotId?d.slot_id===slotId:true));
        if(b.length){const maxId=Math.max(...b.map(d=>d.id));drs=drs.filter(d=>d.id!==maxId);persist();render();}
        return;
      } else if(chk.dataset.odemeAc){ modalOdeme(+chk.dataset.odemeAc, chk.dataset.slotId?+chk.dataset.slotId:null); return;
      } else if(chk.dataset.checklistAc){ modalChecklist(+chk.dataset.checklistAc); return;
      } else if(chk.dataset.ogrDetay){ modalOgrDetay(+chk.dataset.ogrDetay); return;
      } else if(chk.dataset.slotSil){ slot=slot.filter(s=>s.id!==+chk.dataset.slotSil);persist();render(); return; }
    }
    // Toolbar buttons (by id)
    const t=e.target.closest("[id]");
    if(!t)return;
    if(t.id==="btn-yeniOgr") modalYeniOgr();
    if(t.id==="btn-yeniSlot") modalYeniSlot();
    if(t.id==="btn-duzenleAra") modalDuzenleAra();
    if(t.id==="hafta-prev"){haftaOff--;render();}
    if(t.id==="hafta-next"){haftaOff++;render();}
    if(t.id==="hafta-reset"){haftaOff=0;render();}
  };
}

function tabTiklaSesi(){
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // İki katman: hafif "tık" + yumuşak "tın"
    
    // 1. Kısa tık (transient)
    const osc1 = ctx.createOscillator();
    const gain1 = ctx.createGain();
    osc1.connect(gain1);
    gain1.connect(ctx.destination);
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(1200, ctx.currentTime);
    osc1.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.04);
    gain1.gain.setValueAtTime(0.18, ctx.currentTime);
    gain1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
    osc1.start(ctx.currentTime);
    osc1.stop(ctx.currentTime + 0.06);

    // 2. Yumuşak tın (body) - Mac karakteri
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    osc2.connect(filter);
    filter.connect(gain2);
    gain2.connect(ctx.destination);
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(480, ctx.currentTime);
    osc2.frequency.exponentialRampToValueAtTime(320, ctx.currentTime + 0.12);
    filter.type = 'lowpass';
    filter.frequency.value = 800;
    gain2.gain.setValueAtTime(0.12, ctx.currentTime);
    gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.14);
    osc2.start(ctx.currentTime);
    osc2.stop(ctx.currentTime + 0.14);

    setTimeout(()=>ctx.close(), 300);
  } catch(e){}
}

function doldurSnapListesi(){
  const allSnaps = Object.keys(localStorage)
    .filter(k=>k.startsWith("doras_snap_"))
    .sort().reverse().slice(0,20);
  const wrap = document.getElementById("snap-listesi");
  if(!wrap) return;
  if(!allSnaps.length){
    wrap.innerHTML = '<div class="f12 c-dim">Henüz yedek yok (ilk kayıtta oluşur)</div>';
    return;
  }
  let html = '';
  allSnaps.forEach(function(k){
    const s = JSON.parse(localStorage.getItem(k)||"{}");
    const ogSayisi = (s.ogr||[]).length;
    const drsSayisi = (s.drs||[]).length;
    const odmSayisi = (s.odm||[]).length;
    const tarih = s.tarih || k;
    html += '<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--card);border:1px solid var(--card-bd);border-radius:5px;margin-bottom:4px">'
          + '<div style="flex:1"><div class="f12 fw6">'+esc(tarih)+'</div>'
          + '<div class="f10 c-dim">'+ogSayisi+' öğrenci · '+drsSayisi+' ders · '+odmSayisi+' ödeme</div></div>'
          + '<button onclick="snapGeriYukle(\''+k+'\')" style="background:var(--lime);color:#0d0d0b;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:700">Geri Yükle</button>'
          + '</div>';
  });
  wrap.innerHTML = html;
}

function snapGeriYukle(key){
  const s = JSON.parse(localStorage.getItem(key)||"{}");
  if(!s.ogr){ alert("Yedek bulunamadı"); return; }
  if(!confirm(s.tarih + " tarihli yedeğe dönülsün mü?\n" + s.ogr.length + " öğrenci yüklenecek.\nMevcut verinin üzerine yazılacak!")) return;
  ogr=s.ogr||[]; slot=s.slot||[]; drs=s.drs||[]; odm=s.odm||[];
  const allIds=[...ogr.map(x=>x.id),...slot.map(x=>x.id),...drs.map(x=>x.id),...odm.map(x=>x.id)];
  _nid = allIds.length ? Math.max(...allIds)+1 : 100;
  persist(); closeOverlay(); render();
  setTimeout(()=>alert("✅ " + s.tarih + " tarihli yedeğe dönüldü!"), 100);
}

    const url = document.getElementById("f-gasUrl").value.trim();
    if(!url){ alert("URL girin"); return; }
    const btn = document.getElementById("btn-testSync");
    btn.textContent="Test ediliyor…"; btn.disabled=true;
    try {
      const res2 = await fetch(url+"?action=ping&t="+Date.now());
      const j = await res2.json();
      if(j.ok) alert("✅ Bağlantı başarılı! Drive sync hazır.");
      else alert("⚠️ Sunucu yanıtladı ama hata: " + JSON.stringify(j));
    } catch(e){ alert("❌ Bağlanamadı: " + e.message + "\n\nURL doğru mu? Apps Script yayınlandı mı?"); }
    btn.textContent="Bağlantıyı Test Et"; btn.disabled=false;
  };

  // Drive'a gönder / al
  if(hasUrl){
    document.getElementById("btn-syncNow").onclick = () => { syncToDrive(false); closeOverlay(); };
    document.getElementById("btn-syncNowFrom").onclick = () => { closeOverlay(); setTimeout(syncFromDrive, 100); };
  }

  // Export JSON
  document.getElementById("btn-doExport").onclick = () => {
    const data = {ogr,slot,drs,odm,exportDate:new Date().toISOString(),version:1};
    const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url;
    const d=new Date();
    a.download=`doras-yedek-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}.json`;
    a.click(); URL.revokeObjectURL(url);
  };

  // Import JSON
  document.getElementById("btn-doImport").onclick = () => document.getElementById("inp-importFile").click();
  document.getElementById("inp-importFile").onchange = (e) => {
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.ogr||!data.slot){alert("Geçersiz dosya!"); return;}
        if(!confirm(`${data.ogr.length} öğrenci, ${data.drs.length} ders yüklenecek. Devam?`)) return;
        ogr=data.ogr; slot=data.slot; drs=data.drs; odm=data.odm;
        const allIds=[...ogr.map(x=>x.id),...slot.map(x=>x.id),...drs.map(x=>x.id),...odm.map(x=>x.id)];
        _nid=allIds.length?Math.max(...allIds)+1:100;
        persist(); closeOverlay(); render();
        setTimeout(()=>alert("✅ Veriler yüklendi!"),100);
      } catch(err){alert("Dosya okunamadı: "+err.message);}
    };
    reader.readAsText(file);
  };
}

document.getElementById('btn-exportImport').onclick = () => modalExportImport();
document.getElementById('btn-syncFrom').onclick = () => syncFromDrive();

// Teacher filter onchange
document.addEventListener('change', e=>{
  if(e.target.id==='prog-ogretmen-filter'){
    window._progOgretmenFilter = e.target.value;
    render();
  }
  if(e.target.id==='ogr-filtre-ders'){
    window._ogrFiltreDers = e.target.value;
    render();
  }
  if(e.target.id==='ogr-filtre-ogr'){
    window._ogrFiltreOgr = e.target.value;
    render();
  }
});

// On load: show sync status
setSyncStatus('idle','');
// Warn if sync not configured
if(!GAS_URL){
  setTimeout(()=>{
    const banner = document.createElement('div');
    banner.id = 'sync-warn';
    banner.style.cssText = 'position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#3a1010;border:1.5px solid var(--red);border-radius:8px;padding:10px 18px;font-size:12px;color:var(--red);z-index:999;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5)';
    banner.innerHTML = "⚠ Sync ayarlanmamış — veriler sadece bu cihazda! " +
      '<button onclick="modalExportImport()" style="background:var(--red);color:#fff;border:none;padding:3px 10px;border-radius:4px;cursor:pointer;margin-left:8px;font-size:11px">Ayarla</button> ' +
      '<button onclick="this.parentElement.remove()" style="background:transparent;border:none;color:var(--red);cursor:pointer;margin-left:4px;font-size:14px">×</button>';
    document.body.appendChild(banner);
  }, 3000);
}
if(GAS_URL){
  // Startup: 2sn sonra Drive'ı kontrol et
  // Timestamp karşılaştırması ile güvenli senkronizasyon
  setTimeout(()=>{
    syncFromDrive(true); // Timestamp'e göre karar verir
  }, 2000);
  // Eğer local daha yeni ise 4sn sonra Drive'a gönder
  setTimeout(()=>{
    const localTs = load("doras_last_ts", 0);
    if(localTs > 0 && ogr.length > 0) syncToDrive(true);
  }, 4000);
}
